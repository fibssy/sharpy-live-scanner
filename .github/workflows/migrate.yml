name: Run Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install psycopg2-binary python-dotenv

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Normalise URL for psql (postgres:// -> postgresql://)
          export DATABASE_URL="${DATABASE_URL/postgres:\/\//postgresql://}"
          python migrate.py
